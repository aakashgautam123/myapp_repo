<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>File Upload</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    background: white;
    padding: 30px;
    border-radius: 16px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
  }

  h2 {
    margin-bottom: 20px;
    color: #333;
  }

  input[type="file"] {
    width: 100%;
    padding: 10px;
    border: 2px dashed #ccc;
    border-radius: 10px;
    margin-bottom: 20px;
    cursor: pointer;
    transition: 0.3s;
  }

  input[type="file"]:hover {
    border-color: #667eea;
    background: #f5f7ff;
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #667eea;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #5a67d8;
    transform: translateY(-2px);
  }

  .footer {
    margin-top: 15px;
    font-size: 12px;
    color: #888;
  }
</style>
</head>

<body>

<div class="card">
  <h2>📁 Upload Your File</h2>

  <form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file" />
    <button type="submit">Upload File</button>
  </form>

  <div class="footer">
    Secure upload powered by your system
  </div>
</div>

</body>
</html>
