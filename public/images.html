<!DOCTYPE html>
<html>
<head>
  <title>Image Gallery</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>📸 My S3 Images</h2>

<div id="gallery" class="grid"></div>

<script>
fetch('/api/images')
  .then(res => res.json())
  .then(data => {
    const gallery = document.getElementById('gallery');

    data.forEach(img => {
      const div = document.createElement('div');
      div.className = 'card';

      div.innerHTML = `
        <img src="${img.url}" />
      `;

      gallery.appendChild(div);
    });
  });
</script>

</body>
</html>
